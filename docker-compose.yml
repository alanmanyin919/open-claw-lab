services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
      args:
        OPENCLAW_BASE_IMAGE: ${OPENCLAW_BASE_IMAGE:-debian:bookworm-slim}
        OPENCLAW_NODE_MAJOR: ${OPENCLAW_NODE_MAJOR:-22}
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    container_name: openclaw-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DISPLAY: ${DISPLAY:-:1}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M2.5}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      VNC_PORT: ${VNC_PORT:-5901}
      VNC_PASSWORD: ${VNC_PASSWORD:-}
      SCREEN_GEOMETRY: ${SCREEN_GEOMETRY:-1440x900x24}
    volumes:
      - openclaw_data:/root/.openclaw
    ports:
      - "18789:18789"
      - "5901:5901"
    networks:
      - openclaw-net

volumes:
  openclaw_data:

networks:
  openclaw-net:
